openapi: 3.0.3
info:
  title: Stock Detail — Company / Valuation API (re-spec for 022-stock-detail-layered-analysis)
  version: "1.1.0"
  description: |
    기존 GET /company/{symbol} 응답에 `asset_class` 필드를 추가한다.
    하위 호환: 기존 필드(company, metrics, revenue_segments, cached_at)는 변경 없음.

paths:
  /company/{symbol}:
    get:
      summary: 종목 회사 정보 + 가치 지표 + 자산군
      parameters:
        - in: path
          name: symbol
          required: true
          schema: { type: string }
          example: "005930"
        - in: query
          name: market
          required: false
          schema:
            type: string
            enum: [KR, KOSPI, KOSDAQ, US, CRYPTO]
            default: KR
      responses:
        "200":
          description: OK — 미지원 자산군이라도 200을 반환하고 metrics는 null 가능.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyResponse"
              examples:
                stock_kr:
                  summary: KR 개별주 (삼성전자)
                  value:
                    company:
                      name: "Samsung Electronics"
                      sector: "Technology"
                      industry: "Semiconductors"
                      country: "South Korea"
                    metrics:
                      market_cap: 530000000000000
                      per: 14.2
                      pbr: 1.3
                      roe: 9.8
                      eps: 4200
                      dividend_yield: 2.1
                      currency: "KRW"
                    revenue_segments: null
                    asset_class: "STOCK_KR"
                    reporting_period: "2025-Q4"
                    cached_at: "2026-04-14T03:21:00Z"
                etf_kr:
                  summary: KR ETF (KODEX 200)
                  value:
                    company: null
                    metrics: null
                    revenue_segments: null
                    asset_class: "ETF"
                    reporting_period: null
                    cached_at: "2026-04-14T03:21:00Z"
                crypto:
                  summary: Crypto (BTC-USD)
                  value:
                    company: null
                    metrics: null
                    revenue_segments: null
                    asset_class: "CRYPTO"
                    reporting_period: null
                    cached_at: null

components:
  schemas:
    AssetClass:
      type: string
      enum: [STOCK_KR, STOCK_US, ETF, CRYPTO, INDEX, FX]

    CompanyInfo:
      type: object
      nullable: true
      properties:
        name: { type: string, nullable: true }
        sector: { type: string, nullable: true }
        industry: { type: string, nullable: true }
        country: { type: string, nullable: true }

    ValuationMetrics:
      type: object
      nullable: true
      description: 미지원 자산군이면 null. 결측 항목은 개별 필드 null.
      properties:
        market_cap: { type: number, nullable: true }
        per:        { type: number, nullable: true }
        pbr:        { type: number, nullable: true }
        roe:        { type: number, nullable: true, description: "%" }
        eps:        { type: number, nullable: true }
        dividend_yield: { type: number, nullable: true, description: "%" }
        currency:   { type: string, enum: [KRW, USD], nullable: true }
        # 기존 응답의 보조 필드는 하위 호환을 위해 그대로 노출됨 (스펙 외)
        roa:                { type: number, nullable: true }
        bps:                { type: number, nullable: true }
        operating_margin:   { type: number, nullable: true }
        debt_to_equity:     { type: number, nullable: true }

    CompanyResponse:
      type: object
      required: [asset_class]
      properties:
        company:
          $ref: "#/components/schemas/CompanyInfo"
        metrics:
          $ref: "#/components/schemas/ValuationMetrics"
        revenue_segments:
          type: array
          nullable: true
          items:
            type: object
        asset_class:
          $ref: "#/components/schemas/AssetClass"
        reporting_period:
          type: string
          nullable: true
          description: |
            보고 기준일 — yfinance info의 mostRecentQuarter(분기 종료일) 또는
            lastFiscalYearEnd(연간 종료일) 중 최신값. 예: "2025-Q4" 또는 "2024-12-31".
        cached_at:
          type: string
          nullable: true
          format: date-time
          description: 응답 캐시 시각 (UTC ISO-8601).
